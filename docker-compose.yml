version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: marp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marp}
      POSTGRES_USER: ${POSTGRES_USER:-marp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marp}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marp} -d ${POSTGRES_DB:-marp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: marp-api
    restart: unless-stopped
    environment:
      MARP_DATABASE_URL: ${MARP_DATABASE_URL:-postgresql+asyncpg://marp:marp@postgres:5432/marp}
      MARP_REDIS_URL: ${MARP_REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
