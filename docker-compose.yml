services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: marp-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MARP_API_BASE_URL: http://api:8000/api
      NEXT_PUBLIC_API_BASE_URL: http://api:8000/api
    ports:
      - "${WEB_PORT:-80}:3000"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: marp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marp}
      POSTGRES_USER: ${POSTGRES_USER:-marp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marp}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marp} -d ${POSTGRES_DB:-marp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marp-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    container_name: marp-api
    restart: unless-stopped
    environment:
      MARP_ENV: ${MARP_ENV:-production}
      MARP_API_PREFIX: ${MARP_API_PREFIX:-/api}
      MARP_DATABASE_URL: ${MARP_DATABASE_URL:-postgresql+asyncpg://marp:marp@postgres:5432/marp}
      MARP_REDIS_URL: ${MARP_REDIS_URL:-redis://redis:6379/0}
      MARP_DIRECTOR_VISIBILITY_DELAY_SECONDS: ${MARP_DIRECTOR_VISIBILITY_DELAY_SECONDS:-300}
      MARP_SCHEDULER_POLL_SECONDS: ${MARP_SCHEDULER_POLL_SECONDS:-15}
      MARP_WORLD_DEFAULT_SPEED_MULTIPLIER: ${MARP_WORLD_DEFAULT_SPEED_MULTIPLIER:-60}
      MARP_DB_AUTO_CREATE_SCHEMA: ${MARP_DB_AUTO_CREATE_SCHEMA:-true}
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
